<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="피부관리 루틴 대시보드">
    <title>피부관리 루틴 | 대시보드</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css?v=100">
    <link rel="stylesheet" href="skincare.css?v=37">
</head>

<body class="sc-page">
    <div class="container">
        <!-- Header -->
        <header>
            <nav class="nav-tabs">
                <a href="index.html" class="nav-tab">가계부</a>
                <a href="skincare.html" class="nav-tab active">피부관리</a>
            </nav>
        </header>

        <!-- Today's Summary -->
        <section class="sc-today">
            <div class="sc-today-label">TODAY</div>
            <h2 class="sc-today-day" id="todayDay"></h2>
            <div class="sc-today-active" id="todayActive"></div>
        </section>

        <!-- Two-Column: Routine (left) + Calendar & Spot Care (right) -->
        <div class="sc-two-col">
            <!-- Left: Time Toggle + Routine Steps -->
            <div class="sc-two-col-left">
                <div class="sc-time-row">
                    <div class="sc-time-toggle">
                        <button class="sc-time-btn" data-time="morning">아침</button>
                        <button class="sc-time-btn" data-time="evening">저녁</button>
                    </div>
                    <div class="sc-section-actions">
                        <button class="sc-copy-btn" id="copyRoutineBtn" title="전체 루틴 복사">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            복사
                        </button>
                        <button class="sc-copy-btn" id="importRoutineBtn" title="루틴 가져오기">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            가져오기
                        </button>
                    </div>
                </div>
                <section class="sc-routine" id="routineSteps">
                    <!-- populated by JS -->
                </section>
            </div>

            <!-- Right: Weekly Calendar + Spot Care -->
            <div class="sc-two-col-right">
                <section class="sc-section">
                    <h3 class="sc-section-title">주간 캘린더</h3>
                    <div class="sc-calendar" id="weeklyCalendar"></div>
                </section>

                <section class="sc-section">
                    <div class="sc-section-header">
                        <h3 class="sc-section-title" style="border:none;margin:0;padding:0;">스팟 케어</h3>
                        <div class="sc-section-actions">
                            <button class="sc-copy-btn" id="copySpotBtn" title="스팟 케어 복사">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                복사
                            </button>
                            <button class="sc-copy-btn" id="importSpotBtn" title="스팟 케어 가져오기">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                가져오기
                            </button>
                        </div>
                    </div>
                    <div class="sc-spot-grid" id="spotCareGrid">
                        <!-- populated by JS -->
                    </div>
                </section>
            </div>
        </div>

        <!-- Product List -->
        <section class="sc-section">
            <div class="sc-section-header">
                <h3 class="sc-section-title" style="border:none;margin:0;padding:0;">전체 제품 목록</h3>
                <div class="sc-section-actions">
                    <button class="sc-copy-btn" id="copyProductsBtn" title="제품 목록 복사">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        복사
                    </button>
                    <button class="sc-copy-btn" id="importProductsBtn" title="제품 목록 가져오기">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        가져오기
                    </button>
                </div>
            </div>
            <div class="sc-products" id="productList"></div>
        </section>
    </div>

    <!-- Import Routine Modal -->
    <div id="importRoutineModal" class="modal">
        <div class="modal-content sc-import-modal">
            <div class="modal-header">
                <h2>루틴 가져오기</h2>
                <button class="modal-close" id="closeImportRoutine">&times;</button>
            </div>
            <div class="modal-body">
                <p class="sc-import-desc">복사한 루틴 텍스트를 붙여넣으세요. 형식: <code>[아침]</code>, <code>[저녁 공통]</code>, <code>[저녁 월요일 — 테마]</code></p>
                <textarea id="importRoutineText" class="sc-import-textarea" rows="12" placeholder="=== 피부관리 루틴 ===

[아침]
  1. 제품명 | 사용법
  2. 제품명 | 사용법 ⏱대기시간

[저녁 공통]
  1. 제품명 | 사용법

[저녁 월요일 — 레티노이드]
  1. 제품명 | 사용법 ⏱10분 대기
..."></textarea>
                <div id="previewRoutineArea" class="sc-preview-area" style="display:none;"></div>
                <div class="sc-import-actions">
                    <button class="btn btn-cancel" id="cancelImportRoutine">취소</button>
                    <button class="btn btn-primary" id="previewImportRoutine">미리보기</button>
                    <button class="btn btn-primary" id="applyImportRoutine" style="display:none;">적용</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Import Products Modal -->
    <div id="importProductsModal" class="modal">
        <div class="modal-content sc-import-modal">
            <div class="modal-header">
                <h2>제품 목록 가져오기</h2>
                <button class="modal-close" id="closeImportProducts">&times;</button>
            </div>
            <div class="modal-body">
                <p class="sc-import-desc">복사한 제품 목록을 붙여넣으세요. 형식: <code>[카테고리]</code> 아래에 <code>- 제품명 | 역할 | 시점</code></p>
                <textarea id="importProductsText" class="sc-import-textarea" rows="12" placeholder="[클렌징]
- 일리윤 세라마이드 클렌저 | 저자극 세안 | 아침+저녁
- 라운드랩 독도 클렌징 오일 | 선크림·피지 제거 | 저녁 1차

[토너/패드]
- 라운드랩 독도 토너 | 수분 + pH 정리 | 아침·저녁
..."></textarea>
                <div id="previewProductsArea" class="sc-preview-area" style="display:none;"></div>
                <div class="sc-import-actions">
                    <button class="btn btn-cancel" id="cancelImportProducts">취소</button>
                    <button class="btn btn-primary" id="previewImportProducts">미리보기</button>
                    <button class="btn btn-primary" id="applyImportProducts" style="display:none;">적용</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Import Spot Care Modal -->
    <div id="importSpotModal" class="modal">
        <div class="modal-content sc-import-modal">
            <div class="modal-header">
                <h2>스팟 케어 가져오기</h2>
                <button class="modal-close" id="closeImportSpot">&times;</button>
            </div>
            <div class="modal-body">
                <p class="sc-import-desc">복사한 스팟 케어 목록을 붙여넣으세요. 형식: <code>아이콘 | 증상 | 제품명 | 사용법</code> (제품 여러개: 쉼표로 구분)</p>
                <textarea id="importSpotText" class="sc-import-textarea" rows="10" placeholder="🔴 | 새 여드름 | 파티온 트러블 세럼, 아젤리아크림 | 저녁 마지막, 해당 부위만
🟤 | 자국/색소침착 | 아젤리아크림 | 저녁 크림 후, 주 3~4회
🔥 | 염증 심할 때 | 노스카나겔 | 취침 전, 얇게 도포
😳 | 홍조/열감 | 냉장 캐롯 카밍 패드 | 토너 대신 사용, 시카 밤 교체"></textarea>
                <div id="previewSpotArea" class="sc-preview-area" style="display:none;"></div>
                <div class="sc-import-actions">
                    <button class="btn btn-cancel" id="cancelImportSpot">취소</button>
                    <button class="btn btn-primary" id="previewImportSpot">미리보기</button>
                    <button class="btn btn-primary" id="applyImportSpot" style="display:none;">적용</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

            apiKey: "AIzaSyBxymXMFAEFStn2p3dHz3ItHbxYnjlQN9w",

        window.db = firebase.database();

    <script src="auth.js?v=10"></script>
    <script src="skincare.js?v=25"></script>
</body>

</html>
